# Receive OTLP from the agents; export traces to Jaeger and derive RED metrics
# (rate/errors/duration per span) via the spanmetrics connector → Prometheus.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

connectors:
  # Turns spans (agent.run / guard.review / triage.run / chat <model> / execute_tool)
  # into call-count + latency-histogram metrics, namespaced "agent_".
  spanmetrics:
    namespace: agent
    histogram:
      explicit:
        buckets: [50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s, 30s]
    dimensions:
      - name: gen_ai.request.model

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, spanmetrics]
    metrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheus]
