global:
  scrape_interval: 15s

scrape_configs:
  # RED metrics derived from agent OTel spans (via the collector's spanmetrics).
  - job_name: otel-spanmetrics
    static_configs:
      - targets: ["otel-collector:8889"]

  # Per-run batch metrics pushed by the agents (cost, findings, latency, outcomes).
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
