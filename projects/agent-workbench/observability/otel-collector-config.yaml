# OpenTelemetry Collector config: receive OTLP from the agent, forward to Jaeger.
#
# This is where you'd later add sampling, PII redaction (attributes processor),
# or fan-out to a second backend (Tempo, Honeycomb, an eval pipeline).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Forward traces to Jaeger's OTLP endpoint.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Also log a summary to the collector's stdout (handy while learning).
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
